# OpenClaw Fly.io deployment configuration
# See https://fly.io/docs/reference/configuration/

app = "openclaw"
primary_region = "iad" # change to your closest region

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
# Fly uses x86, but keep this for consistency
OPENCLAW_PREFER_PNPM = "1"
OPENCLAW_STATE_DIR = "/data"
NODE_OPTIONS = "--max-old-space-size=1536"

# This process binds the gateway beyond loopback (`--bind lan`) behind Fly's
# public HTTP service. The gateway refuses to start on a non-loopback bind
# without auth, so you MUST provide a token before deploying:
#   fly secrets set OPENCLAW_GATEWAY_TOKEN="$(openssl rand -hex 32)"
# (Fly injects secrets as env vars; do not put the token in [env] above, which
# is committed to git. See render.yaml for the equivalent generated value.)
[processes]
app = "node dist/index.js gateway --allow-unconfigured --port 3000 --bind lan"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = false # Keep running for persistent connections
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
size = "shared-cpu-2x"
memory = "2048mb"

[mounts]
source = "openclaw_data"
destination = "/data"
